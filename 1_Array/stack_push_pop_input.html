  <script>
    let arr = [12];
    let max = 10;
    let currentLength = arr.length;
    const push = (val) => {
      if (currentLength >= max) {
        alert("can't")
      } else {
        arr[currentLength] = val;
        currentLength++;
      }
    };
    push(55)
    push(22)
    const pop = () => {
      if (currentLength <= 0) {
        alert("Can't");
      } else {
        currentLength--;
        arr.length = currentLength;
      }
    };
    pop()
    // pop()
    document.write(arr);
  </script>
