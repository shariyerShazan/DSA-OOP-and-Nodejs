<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    let name = "shazan";
    const reverseString = (string) => {
      let reverse = "";
      for (let i = string.length - 1; i >= 0; i--) {
        reverse += string[i];
      }
      return reverse;
    };
    document.write(reverseString(name), " one <br/>");

    const reverseStrinTwo = (string) => {
      let arr = string.split("");
      let start = 0;
      let end = arr.length - 1;

      while (start < end) {
        let temp = arr[start];
        arr[start] = arr[end];
        arr[end] = temp;
        start++;
        end--;
      }
      return arr.join("");
    };
    document.write(reverseStrinTwo(name), " two");
  </script>
</html>
